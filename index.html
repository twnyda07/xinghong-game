/* ============ 引擎 ============ */
const app=document.getElementById("app");
const barEl=document.getElementById("bar");
const beadsEl=document.getElementById("beads");
const mLeft=document.getElementById("mLeft");
const TOTAL_Q = LEVELS.reduce((n,l)=>n+l.qs.length,0); // 100
const RANDOM_PER_LEVEL = 2;   // 每級抽 2 題 → 共 10 題

let mode=null;                // "full" | "random"
let beads=0, answered=0, totalThis=0;
let phase="intro";            // intro|mode|learn|quiz|levelend|rquiz|reflect
let li=0, qi=0;               // 完整模式指標
let testSet=[], ti=0;         // 隨機模式題組

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildTest(){
  // 每級隨機抽 RANDOM_PER_LEVEL 題，依等級順序串接 → 由淺到深；每級內隨機 → 每次都不同
  testSet=[];
  LEVELS.forEach((L,idx)=>{ shuffle(L.qs).slice(0,RANDOM_PER_LEVEL).forEach(q=>testSet.push({li:idx,q})); });
}

function setBar(){ barEl.style.width=(totalThis? answered/totalThis*100:0)+"%"; beadsEl.textContent=beads; }
function scrollTop(){ window.scrollTo({top:0,behavior:"smooth"}); }

function bindOptions(q, afterAnswer){
  const fb=document.getElementById("fb");
  const opts=[...document.querySelectorAll(".opt")];
  opts.forEach(b=>b.onclick=()=>{
    const i=+b.dataset.i; opts.forEach(x=>x.disabled=true); answered++;
    if(i===q.a){ b.classList.add("correct"); beads++;
      fb.className="feedback ok show";
      fb.innerHTML=`✅ <b>答對！</b> ${q.w}　<span style="color:var(--gold)">+1 🔆</span>`;
    } else { b.classList.add("wrong"); opts[q.a].classList.add("correct");
      fb.className="feedback no show";
      fb.innerHTML=`💡 正解已標示。 ${q.w}`;
    }
    setBar(); afterAnswer();
  });
}

function render(){
  setBar();
  if(phase==="intro") return renderIntro();
  if(phase==="mode") return renderMode();
  if(phase==="learn") return renderLearn();
  if(phase==="quiz")  return renderQuiz();
  if(phase==="levelend") return renderLevelEnd();
  if(phase==="rquiz") return renderRQuiz();
  if(phase==="reflect") return renderReflect();
}

function renderIntro(){
  mLeft.textContent="序章";
  app.innerHTML=`<div class="screen">
    <span class="tag">${INTRO.tag}</span><h2>${INTRO.title}</h2>${INTRO.html}
    <div class="center"><button class="btn" id="go">選擇模式 →</button></div></div>`;
  go.onclick=()=>{ phase="mode"; render(); };
}

function renderMode(){
  mLeft.textContent="選擇模式";
  app.innerHTML=`<div class="screen">
    <span class="tag">選擇模式</span><h2>你想怎麼玩？</h2>
    <div class="learn">
      <div class="item" id="m-random" style="cursor:pointer">
        <span class="emo">🎲</span><div><b>隨機抽考 ・ 10 題</b><br>
        <span>從五個等級各隨機抽 2 題，由淺到深排列，<b style="color:var(--gold-soft)">每次題目都不一樣</b>。適合快速複習、反覆練習。</span></div></div>
      <div class="item" id="m-full" style="cursor:pointer">
        <span class="emo">📚</span><div><b>完整學習 ・ 100 題</b><br>
        <span>五級依序闖關，每級先看重點學習卡再答題。適合第一次完整學習。</span></div></div>
    </div>
    <p class="note">點選上方任一張卡片開始。</p>
    <div class="center"><button class="btn ghost" id="back">← 回序章</button></div></div>`;
  document.getElementById("m-random").onclick=startRandom;
  document.getElementById("m-full").onclick=startFull;
  document.getElementById("back").onclick=()=>{ phase="intro"; render(); };
  scrollTop();
}
function startRandom(){ mode="random"; buildTest(); beads=0; answered=0; totalThis=testSet.length; ti=0; phase="rquiz"; render(); }
function startFull(){ mode="full"; beads=0; answered=0; totalThis=TOTAL_Q; li=0; qi=0; phase="learn"; render(); }

function renderRQuiz(){
  const item=testSet[ti], L=LEVELS[item.li], q=item.q;
  mLeft.textContent=`隨機抽考　第 ${ti+1}/${testSet.length} 題`;
  app.innerHTML=`<div class="screen">
    <span class="tag">LEVEL ${item.li+1}・${L.sub}</span>
    <div class="q"><span class="qn">第 ${ti+1} 題.</span> ${q.q}</div>
    <div class="opts" id="opts">${q.o.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join("")}</div>
    <div class="feedback" id="fb"></div>
    <div class="center" id="navArea"></div></div>`;
  bindOptions(q, ()=>{
    const last = ti+1>=testSet.length;
    document.getElementById("navArea").innerHTML=`<button class="btn" id="nx">${last?"看結果 →":"下一題 →"}</button>`;
    nx.onclick=()=>{ if(last){ phase="reflect"; render(); } else { ti++; render(); } };
  });
  scrollTop();
}

function renderLearn(){
  const L=LEVELS[li];
  mLeft.textContent=`${L.name}`;
  const cards=L.learn.map(it=>`<div class="item"><span class="emo">${it.emo}</span>
     <div><b>${it.b}</b><br><span>${it.s}</span></div></div>`).join("");
  app.innerHTML=`<div class="screen">
    <div class="lvlbadge">LEVEL ${li+1} / 5</div>
    <h2>${L.name}</h2><span class="tag">${L.sub}</span>
    <p class="lead">先認識重點，再開始闖關（本級 ${L.qs.length} 題）：</p>
    <div class="learn">${cards}</div>
    <div class="center"><button class="btn" id="start">開始闖關 →</button></div></div>`;
  start.onclick=()=>{ phase="quiz"; qi=0; render(); };
  scrollTop();
}

function renderQuiz(){
  const L=LEVELS[li], q=L.qs[qi];
  mLeft.textContent=`${L.name}　第 ${qi+1}/${L.qs.length} 題`;
  app.innerHTML=`<div class="screen">
    <span class="tag">LEVEL ${li+1}・${L.sub}</span>
    <div class="q"><span class="qn">Q${globalQno()}.</span> ${q.q}</div>
    <div class="opts" id="opts">${q.o.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join("")}</div>
    <div class="feedback" id="fb"></div>
    <div class="center" id="navArea"></div></div>`;
  bindOptions(q, ()=>{
    const last = qi+1>=L.qs.length;
    document.getElementById("navArea").innerHTML=
      `<button class="btn" id="nx">${last?"完成本級 →":"下一題 →"}</button>`;
    nx.onclick=()=>{
      if(last){ phase="levelend"; render(); }
      else { qi++; render(); }
    };
  });
  scrollTop();
}

function globalQno(){
  let n=0; for(let k=0;k<li;k++) n+=LEVELS[k].qs.length; return n+qi+1;
}

function renderLevelEnd(){
  const L=LEVELS[li];
  const last = li+1>=LEVELS.length;
  mLeft.textContent=`${L.name}・過關`;
  app.innerHTML=`<div class="screen center">
    <div class="big">${last?"🏆":"🎉"}</div>
    <h2>${L.name}　完成！</h2>
    <p class="lead">目前已答 <b style="color:var(--gold)">${answered}/${TOTAL_Q}</b> 題，
      累積智慧明珠 <b style="color:var(--gold)">${beads} 🔆</b>。</p>
    ${last?`<p class="lead">五個等級全部走完，最後來反思與討論 👇</p>`:
            `<p class="lead">繼續前往下一級，難度再升一點！</p>`}
    <div class="center"><button class="btn" id="cont">${last?"前往反思 →":"進入下一級 →"}</button></div>
  </div>`;
  cont.onclick=()=>{
    if(last){ phase="reflect"; render(); }
    else { li++; phase="learn"; render(); }
  };
  scrollTop();
}

function renderReflect(){
  mLeft.textContent="反思與討論";
  const pct=Math.round(beads/totalThis*100);
  const medal = pct>=90?"🥇 法海導師":pct>=70?"🥈 精進學人":pct>=50?"🥉 初心行者":"🌱 結緣新生";
  const isRandom = mode==="random";
  const fields=REFLECT_QS.map(q=>`<label>${q}</label><textarea placeholder="寫下你的想法…"></textarea>`).join("");
  app.innerHTML=`<div class="screen center">
      <div class="big">🪷</div><h2>${isRandom?"抽考完成！":"闖關完成！"}</h2>
      <p class="lead">你在 ${totalThis} 題中答對 <b style="color:var(--gold)">${beads} 題（${pct}%）</b>。</p>
      <div class="pill">${medal}</div>
      <p class="lead" style="margin-top:12px;">${isRandom
        ? "想換一批題目？點下方「再玩一次」會重新隨機抽 10 題——由淺到深、每次都不同。"
        : `走完地圖：<b style="color:var(--gold-soft)">五時</b> → <b style="color:var(--gold-soft)">八教（藏通別圓・頓漸秘密不定）</b> → <b style="color:var(--gold-soft)">四諦觀法位次</b> → <b style="color:var(--gold-soft)">十乘觀法</b>。`}</p>
    </div>
    <div class="screen reflect" style="margin-top:14px;">
      <span class="tag">最後一站・反思與討論</span>
      <h2>把學到的，變成你自己的</h2>
      <p class="note">沒有標準答案。寫下你的想法，或與同學、師長一起討論 👇</p>
      ${fields}
      <div class="row" style="margin-top:18px;">
        <button class="btn" id="copy">📋 複製我的反思</button>
        <button class="btn ghost" id="again">↺ 再玩一次</button>
      </div>
      <p class="note" id="copied" style="min-height:1.2em;"></p>
    </div>`;
  document.getElementById("again").onclick=()=>{ phase="mode"; render(); };
  document.getElementById("copy").onclick=()=>{
    const tas=[...document.querySelectorAll(".reflect textarea")];
    let out=`《教觀綱宗・闖關之旅》我的反思（答對 ${beads}/${totalThis}）\n\n`;
    REFLECT_QS.forEach((q,i)=>{ out+=q+"\n→ "+(tas[i].value.trim()||"（尚未填寫）")+"\n\n"; });
    navigator.clipboard.writeText(out).then(()=>{
      document.getElementById("copied").textContent="✅ 已複製，可貼到聊天室或筆記與大家分享！";
    }).catch(()=>{ document.getElementById("copied").textContent="（無法自動複製，請手動選取）"; });
  };
  scrollTop();
}

render();
</script>
</body>
</html>
