<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學佛小遊戲樂園</title>
<style>
  :root{
    --bg1:#171228; --bg2:#241a45; --gold:#e9c46a; --gold-soft:#f2dca0;
    --ink:#f3eede; --muted:#b9b1d6; --line:#4a3c7e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; min-height:100vh; font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    color:var(--ink); background:radial-gradient(130% 90% at 50% 0%,var(--bg2),var(--bg1));
    display:flex; justify-content:center; padding:24px 16px;}
  .wrap{width:100%; max-width:680px;}
  header{text-align:center; margin:18px 0 26px;}
  header .logo{font-size:2.6rem;}
  header h1{font-size:1.6rem; margin:.3em 0 .1em; letter-spacing:2px;}
  header p{color:var(--muted); margin:.2em 0; font-size:.95rem;}
  .games{display:grid; gap:16px;}
  .game{display:block; text-decoration:none; color:var(--ink);
    background:linear-gradient(180deg,#2e2356,#372a66); border:1px solid var(--line);
    border-radius:18px; padding:20px; box-shadow:0 12px 32px rgba(0,0,0,.35);
    transition:.18s; position:relative; overflow:hidden;}
  .game:hover{transform:translateY(-3px); border-color:var(--gold); box-shadow:0 16px 40px rgba(233,196,106,.18);}
  .game .ic{font-size:2.4rem; margin-bottom:6px;}
  .game h2{margin:.1em 0 .3em; font-size:1.22rem; color:var(--gold-soft);}
  .game p{color:var(--muted); line-height:1.7; font-size:.92rem; margin:.2em 0 .8em;}
  .game .go{color:var(--gold); font-weight:700; font-size:.95rem;}
  .game .badge{position:absolute; top:14px; right:16px; font-size:.72rem; color:var(--gold);
    background:rgba(233,196,106,.14); border:1px solid rgba(233,196,106,.35); padding:3px 9px; border-radius:999px;}
  .tags{margin-top:8px;}
  .t{display:inline-block; font-size:.74rem; color:var(--muted); background:rgba(0,0,0,.2);
    border:1px solid var(--line); border-radius:999px; padding:2px 9px; margin:3px 4px 0 0;}
  footer{text-align:center; color:var(--muted); font-size:.78rem; margin:28px 0 8px; line-height:1.8;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🪷</div>
    <h1>學佛小遊戲樂園</h1>
    <p>邊玩邊學・佛學零基礎也能懂</p>
  </header>

  <div class="games">
    <a class="game" href="sudhana.html">
      <span class="badge">新上架</span>
      <div class="ic">🧭</div>
      <h2>善財童子・五十三參之旅</h2>
      <p>跟著善財童子去參訪善知識：文殊發心、念佛、觀音大悲、彌勒樓閣、普賢十大願……一路收集法門寶珠，最後一起反思。</p>
      <div class="go">開始參學 →</div>
      <div class="tags"><span class="t">華嚴經・入法界品</span><span class="t">參訪闖關</span><span class="t">含反思討論</span></div>
    </a>

    <a class="game" href="jiaoguan.html">
      <div class="ic">📖</div>
      <h2>教觀綱宗・闖關之旅</h2>
      <p>由淺入深認識天台「五時八教」與「十乘觀法」。可選「隨機抽考 10 題」或「完整 100 題」，最後有反思討論。</p>
      <div class="go">開始闖關 →</div>
      <div class="tags"><span class="t">天台・教觀綱宗</span><span class="t">100 題／隨機抽考</span><span class="t">含反思討論</span></div>
    </a>
  </div>

  <footer>
    寶嚴・學佛入門互動學習 ・ 內容依佛教經典編寫<br>
    更多遊戲陸續加入中 🙏
  </footer>
</div>
</body>
</html>
